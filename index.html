<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" type="text/css" href="styles.css">

    <title>To do list</title>

</head>

<body>

    <div class="contenedor">
        <div class="parte-izquierda">
            <h1>To-do List</h1>
            <input type="text" id="inputTarea">
            <button id="botonAñadir">Añadir a la lista</button>
            <button id="botonAñadirImportante">Añadir a importantes</button>
            <button id="botonBorrarTodasTareas">Borrar todas las tareas</button>
        </div>
        <div class="parte-derecha">
            <ul id="listaTareas">
                <h1>Tareas</h1>
            </ul>
            <ul id="listaImportantes">
                <h1>Importantes</h1>
            </ul>
        </div>
    </div>
    
    <script src="script.js"></script>

</body>
</html>
